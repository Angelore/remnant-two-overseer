name: .NET

on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
    - name: Set Release Variables
      env:
        REF_NAME: ${{ github.ref_name }}
        REF_TYPE: ${{ github.ref_type }}
        SHA: ${{ github.sha }}
      run: |
        if [[ "$REF_TYPE" == "tag" ]]; then
          version="${REF_NAME#v}"
          assembly_version="$version"
          release_tag="$REF_NAME"
          release_draft="false"
          release_prerelease="false"
        else
          short_sha="${SHA::7}"
          version="0.0.0-dev.sha${short_sha}"
          assembly_version="0.0.0.0"
          release_tag="v${version}"
          release_draft="true"
          release_prerelease="true"
        fi

        echo "VERSION=$version" >> "$GITHUB_ENV"
        echo "ASSEMBLY_VERSION=$assembly_version" >> "$GITHUB_ENV"
        echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
        echo "RELEASE_DRAFT=$release_draft" >> "$GITHUB_ENV"
        echo "RELEASE_PRERELEASE=$release_prerelease" >> "$GITHUB_ENV"
    - name: Build for Windows
      run: dotnet publish --runtime win-x64 -p:PublishSingleFile=true -p:SelfContained=false -p:Version=$VERSION -p:AssemblyVersion=$ASSEMBLY_VERSION
    - name: Build for Linux
      run: dotnet publish --runtime linux-x64 -p:PublishSingleFile=true -p:SelfContained=false -p:Version=$VERSION -p:AssemblyVersion=$ASSEMBLY_VERSION
    - name: Create Linux artifact
      run: |
        tar -C ./RemnantOverseer/bin/Release/net8.0/linux-x64/publish -czvf RemnantOverseer-${RELEASE_TAG}-linux.tar.gz .
    - name: Create Windows artifact
      run: |
        zip -j RemnantOverseer-${RELEASE_TAG}-windows.zip ./RemnantOverseer/bin/Release/net8.0/win-x64/publish/*
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_TAG }}
        target_commitish: ${{ github.sha }}
        draft: ${{ env.RELEASE_DRAFT }}
        prerelease: ${{ env.RELEASE_PRERELEASE }}
        files: |
          RemnantOverseer-${{ env.RELEASE_TAG }}-linux.tar.gz
          RemnantOverseer-${{ env.RELEASE_TAG }}-windows.zip
